<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النسر التفاعلي المطور ثلاثي الأبعاد - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0c14;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .info {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #e0e6ed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.8);
            z-index: 10;
        }
        h2 { margin: 0 0 5px 0; font-weight: 600; letter-spacing: 1px; color: #fff;}
        p { margin: 0; font-size: 14px; color: #a0aec0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="info">
        <h2>محاكي النسر التفاعلي ثلاثي الأبعاد</h2>
        <p>حرك الفأرة عبر الشاشة لترى عيون النسر تتبعك وتنظر إليك ديناميكياً!</p>
    </div>
    <div id="canvas-container"></div>

    <script>
        // 1. إعداد المشهد، الكاميرا والـ Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1d); 
        scene.fog = new THREE.FogExp2(0x0a0f1d, 0.02);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 6, 18); // تقريب الكاميرا قليلاً لرؤية الأعين بوضوح

        const renderer = new WebGLRenderer({ antialias: true, powerPreference: "high-performance" }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true; 
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.2;

        // متغيرات تتبع الفأرة
        const mouse = new THREE.Vector2();
        const targetTarget = new THREE.Vector3(0, 0, 10); // نقطة وهمية ينظر إليها النسر

        // 2. توزيع الإضاءة السينمائية
        const ambientLight = new THREE.AmbientLight(0x1a2634, 0.6); 
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2); 
        sunLight.position.set(15, 30, 15);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048; 
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        const rimLight = new THREE.DirectionalLight(0x88bbff, 0.8);
        rimLight.position.set(-15, 10, -15);
        scene.add(rimLight);

        // 3. بناء مجسم النسر المتطور
        const eagleGroup = new THREE.Group();

        // الخامات
        const featherDarkMat = new THREE.MeshStandardMaterial({ color: 0x2b1a11, roughness: 0.75, flatShading: true });
        const featherLightMat = new THREE.MeshStandardMaterial({ color: 0x422a1d, roughness: 0.8, flatShading: true });
        const headMat = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.6, flatShading: true });
        const beakMat = new THREE.MeshStandardMaterial({ color: 0xe69500, roughness: 0.3, metalness: 0.2, flatShading: true });
        const eyeScleraMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.2 }); // صلابة العين (صفراء حادة)
        const eyePupilMat = new THREE.MeshBasicMaterial({ color: 0x050505 }); // بؤبؤ العين الأسود

        // أ- الجسد الرئيسي
        const bodyGeom = new THREE.CylinderGeometry(1.2, 1.8, 5, 6);
        bodyGeom.rotateX(Math.PI / 2);
        const body = new THREE.Mesh(bodyGeom, featherDarkMat);
        body.castShadow = true;
        body.receiveShadow = true;
        eagleGroup.add(body);

        // إضافة ريش بارز على الظهر والرقبة لتأثير الـ Low-Poly المعمق
        for (let i = 0; i < 15; i++) {
            const featherGeom = new THREE.ConeGeometry(0.3, 1, 4);
            featherGeom.rotateX(Math.PI / 2);
            const bodyFeather = new THREE.Mesh(featherGeom, featherLightMat);
            bodyFeather.position.set(
                (Math.random() - 0.5) * 1.5,
                (Math.random() - 0.5) * 1.2 + 0.5,
                (Math.random() - 0.5) * 3
            );
            bodyFeather.rotation.y = (Math.random() - 0.5) * 0.4;
            bodyFeather.castShadow = true;
            eagleGroup.add(bodyFeather);
        }

        // ب- الرأس المطور مع نظام تتبع العين التفاعلي
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 1.2, 2.8);

        const headGeom = new THREE.SphereGeometry(1.1, 8, 8);
        const headMesh = new THREE.Mesh(headGeom, headMat);
        headMesh.castShadow = true;
        headGroup.add(headMesh);

        // المنقار الحاد
        const upperBeakGeom = new THREE.ConeGeometry(0.35, 1.4, 4);
        upperBeakGeom.rotateX(Math.PI / 1.6);
        const upperBeak = new THREE.Mesh(upperBeakGeom, beakMat);
        upperBeak.position.set(0, 0.3, 1.1);
        headGroup.add(upperBeak);

        // العيون التفاعلية (مجموعات مستقلة للالتفات)
        const leftEyeGroup = new THREE.Group();
        leftEyeGroup.position.set(-0.6, 0.4, 0.6);
        
        const rightEyeGroup = new THREE.Group();
        rightEyeGroup.position.set(0.6, 0.4, 0.6);

        // إنشاء مقلة العين والحدقة لكل طرف
        const scleraGeom = new THREE.SphereGeometry(0.2, 8, 8);
        const pupilGeom = new THREE.SphereGeometry(0.09, 6, 6);
        pupilGeom.scale(1, 1, 0.3); // جعل البؤبؤ مسطحاً فوق العين

        // العين اليسرى
        const leftSclera = new THREE.Mesh(scleraGeom, eyeScleraMat);
        const leftPupil = new THREE.Mesh(pupilGeom, eyePupilMat);
        leftPupil.position.set(0, 0, 0.16); // وضع الحدقة في الأمام
        leftEyeGroup.add(leftSclera, leftPupil);

        // العين اليمنى
        const rightSclera = new THREE.Mesh(scleraGeom, eyeScleraMat);
        const rightPupil = new THREE.Mesh(pupilGeom, eyePupilMat);
        rightPupil.position.set(0, 0, 0.16);
        rightEyeGroup.add(rightSclera, rightPupil);

        headGroup.add(leftEyeGroup, rightEyeGroup);
        eagleGroup.add(headGroup);

        // جـ- الذيل
        const tailGroup = new THREE.Group();
        tailGroup.position.set(0, -0.4, -2.5);
        for(let i = -2; i <= 2; i++) {
            const feather = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 2.8), headMat);
            feather.position.x = i * 0.4;
            feather.rotation.y = i * 0.12;
            feather.rotation.x = 0.08;
            feather.castShadow = true;
            tailGroup.add(feather);
        }
        eagleGroup.add(tailGroup);

        // د- الأجنحة المفصلية
        function createWing(isLeft) {
            const side = isLeft ? -1 : 1;
            const mainWingGroup = new THREE.Group();
            mainWingGroup.position.set(1.5 * side, 0.6, 0);

            const innerGeom = new THREE.BoxGeometry(3.5, 0.25, 2.2);
            innerGeom.translate(1.75 * side, 0, 0);
            const innerMesh = new THREE.Mesh(innerGeom, featherDarkMat);
            innerMesh.castShadow = true;
            mainWingGroup.add(innerMesh);

            const outerWingGroup = new THREE.Group();
            outerWingGroup.position.set(3.5 * side, 0, 0);

            const outerGeom = new THREE.BoxGeometry(4, 0.18, 1.8);
            outerGeom.translate(2 * side, 0, -0.2);
            const outerMesh = new THREE.Mesh(outerGeom, featherLightMat);
            outerMesh.castShadow = true;
            outerWingGroup.add(outerMesh);

            // ريش أطراف الأجنحة المدبب
            for(let i = 0; i < 5; i++) {
                const tipFeather = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 2), featherDarkMat);
                tipFeather.position.set((3.8 + i*0.1) * side, 0, -0.5 - (i*0.25));
                tipFeather.rotation.y = 0.22 * side * (i + 1);
                tipFeather.castShadow = true;
                outerWingGroup.add(tipFeather);
            }

            mainWingGroup.add(outerWingGroup);
            mainWingGroup.userData = { outerPart: outerWingGroup };
            return mainWingGroup;
        }

        const leftWing = createWing(true);
        const rightWing = createWing(false);
        eagleGroup.add(leftWing, rightWing);

        scene.add(eagleGroup);

        // 4. الاستماع لحركة الفأرة وتحديث الإحداثيات
        window.addEventListener('mousemove', (event) => {
            // تحويل إحداثيات الفأرة لتصبح بين (-1 و 1) لتتوافق مع بيئة الـ 3D
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // 5. حلقة التحريك والأنميشن المستمر
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // أ- حركة الأجنحة الفيزيائية
            const flapSpeed = 5.5; 
            const baseFlap = Math.sin(time * flapSpeed);

            leftWing.rotation.z = baseFlap * 0.35;
            rightWing.rotation.z = -baseFlap * 0.35;

            const outerFlap = Math.sin(time * flapSpeed - 0.8);
            leftWing.userData.outerPart.rotation.z = Math.max(0, outerFlap) * 0.4;
            rightWing.userData.outerPart.rotation.z = -Math.max(0, outerFlap) * 0.4;

            // ب- تموجات الجسد أثناء الطيران
            eagleGroup.position.y = Math.sin(time * 1.8) * 0.5;
            eagleGroup.rotation.z = Math.sin(time * 0.9) * 0.04;
            tailGroup.rotation.z = Math.sin(time * 1.8) * 0.1;

            // جـ- منطق تفاعل الأعين والرأس مع الفأرة
            // حساب الموقع المستهدف بناءً على حركة الفأرة في الشاشة
            targetTarget.x = mouse.x * 7;
            targetTarget.y = (mouse.y * 5) + 1.2; // تعويض الارتفاع الافتراضي للرأس
            targetTarget.z = 8; // عمق ثبات النظر للأمام

            // جعل الرأس بأكمله يلتفت بسلاسة نحو الفأرة
            headGroup.lookAt(targetTarget);

            // تدوير حدقات الأعين داخلياً لإضافة تأثير تركيز النظر بشكل واقعي حاد
            leftEyeGroup.lookAt(targetTarget);
            rightEyeGroup.lookAt(targetTarget);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // 6. الحفاظ على مرونة التجاوب مع مقاسات المتصفح
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
